<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Страница не найдена — Byplan</title>
  <style>
    :root{
      --bg: #EDE8EC;
      --bg-rgb: 237, 232, 236;
      --glass-rgb: 255, 255, 255;
      --text: #1C1B1B;
      --card: rgba(var(--glass-rgb),0.86);
      --shadow: 0 12px 30px rgba(0,0,0,0.08);
    }
    *{ box-sizing: border-box; }
    body{
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .container{
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }
    .not-found{
      min-height: 100vh;
      display: flex;
      align-items: center;
    }
    .not-found__card{
      max-width: 720px;
      padding: 36px;
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
    }
    .not-found__title{
      margin: 0 0 12px 0;
      font-size: clamp(2rem, 4vw, 3rem);
    }
    .not-found__text{
      margin-bottom: 20px;
    }
    .badge{
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.08);
      font-size: 0.85rem;
      margin-bottom: 10px;
    }
    .btn{
      display: inline-block;
      padding: 12px 22px;
      border-radius: 999px;
      background: #1C1B1B;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="section not-found">
    <div class="container">
      <div class="not-found__card">
        <div class="badge">Byplan</div>
        <h1 class="not-found__title">Страница не найдена</h1>
        <p class="not-found__text">Проверьте ссылку или вернитесь на главную страницу.</p>
        <a class="btn btn--primary" href="./">На главную</a>
      </div>
    </div>
  </main>
</body>
</html>
