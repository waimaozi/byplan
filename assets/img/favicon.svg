<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#ffffff"/>

  <!-- Floor plan icon (simplified from byplan logo) -->
  <g stroke="#4a4a4a" stroke-width="2.5" fill="none" stroke-linecap="square">
    <!-- Outer walls -->
    <rect x="8" y="6" width="30" height="30" rx="1"/>
    <!-- Inner walls -->
    <line x1="8" y1="21" x2="25" y2="21"/>
    <line x1="25" y1="6" x2="25" y2="28"/>
    <line x1="15" y1="21" x2="15" y2="36"/>
    <!-- Door openings (gaps) -->
    <line x1="18" y1="6" x2="18" y2="10" stroke="#ffffff" stroke-width="3"/>
    <line x1="28" y1="21" x2="32" y2="21" stroke="#ffffff" stroke-width="3"/>
  </g>

  <!-- "byplan" text -->
  <text x="32" y="56" text-anchor="middle" font-family="Georgia, 'DejaVu Serif', serif" font-size="13" fill="#4a4a4a" font-weight="bold" letter-spacing="-0.5">byplan</text>

  <!-- Green checkmark -->
  <path d="M42 26 L47 32 L55 20" stroke="#4a8c3f" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
